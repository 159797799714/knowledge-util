<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h3>案例1: SSE基础案例</h3>
<div id="result"></div>


<script>

    //1.初始化事件源(监听)对象
    const eventSource = new EventSource('http://127.0.0.1:8001/simple_stream');
    //2.内容输出DOM
    const resultDom = document.getElementById('result');

    //3. 定义事件监听
    eventSource.onmessage = function (event) {
        if(event.data === '[END]'){
            eventSource.close();
            return;
        }
        resultDom.innerHTML += event.data + '<br/>';
    }

</script>
</body>
</html>
