<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件导入服务</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 2px dashed #3498db;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            background-color: #ecf6fd;
        }
        .upload-icon {
            font-size: 48px;
            color: #3498db;
            margin-bottom: 10px;
        }
        .file-input {
            display: none;
        }
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        .file-list {
            margin-top: 30px;
        }
        .file-item {
            background-color: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .file-info {
            display: flex;
            flex-direction: column;
            flex: 1;
            margin-right: 20px;
        }
        .file-name {
            font-weight: 600;
            color: #333;
        }
        .file-size {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 4px;
        }
        .status-badge {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            color: white;
            min-width: 80px;
            text-align: center;
        }
        .status-uploading { background-color: #f39c12; }
        .status-processing { background-color: #3498db; }
        .status-completed { background-color: #2ecc71; }
        .status-error { background-color: #e74c3c; }

        /* 简单的进度条 */
        .progress-bar-container {
            width: 100%;
            height: 4px;
            background-color: #f0f0f0;
            margin-top: 8px;
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }
        .progress-bar {
            height: 100%;
            background-color: #f39c12;
            width: 0%;
            transition: width 0.3s, background-color 0.3s;
        }

        /* 任务日志（可展开/收起） */
        .log-details {
            margin-top: 8px;
            font-size: 12px;
            color: #7f8c8d;
        }
        .log-details summary {
            cursor: pointer;
            user-select: none;
            color: #6c7a89;
        }
        .log-list {
            margin: 6px 0 0 16px;
            padding: 0;
        }
        .log-list li {
            margin: 2px 0;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <div class="upload-icon">☁️</div>
    <p>点击或拖拽文件到此处 (PDF/MD)</p>
    <input type="file" id="fileInput" class="file-input" multiple accept=".pdf,.md">
</div>

<div id="fileList" class="file-list">
    <!-- 文件列表将在这里生成 -->
</div>

<script>
    //获取文件上传DOM
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');

    // 模拟后端API地址
    const API_BASE = 'http://127.0.0.1:8000';


    //为这个组件注册一个事件监听器
    fileInput.addEventListener('change', (e) => {
        handleFiles(e.target.files);
    });

    function handleFiles(files) {

        console.log(Array.from(files))
        Array.from(files).forEach(uploadFile);
    }

    async function uploadFile(file) {
        // 创建文件项UI
        const id = 'file-' + Math.random().toString(36).substr(2, 9);
        const html = `
            <div class="file-item" id="${id}">
                <div class="file-info">
                    <span class="file-name">${file.name}</span>
                    <span class="file-size">${(file.size / 1024).toFixed(2)} KB</span>
                    <div class="progress-bar-container">
                        <div class="progress-bar"></div>
                    </div>
                    <details class="log-details">
                        <summary>日志（点击展开）</summary>
                        <ul class="log-list"></ul>
                    </details>
                </div>
                <div class="status-badge status-uploading">上传中...</div>
            </div>
        `;
        fileList.insertAdjacentHTML('afterbegin', html);
        const itemEl = document.getElementById(id);
        const statusBadge = itemEl.querySelector('.status-badge');
        const progressBar = itemEl.querySelector('.progress-bar');
        const progressContainer = itemEl.querySelector('.progress-bar-container');
        const logDetails = itemEl.querySelector('.log-details');
        const logSummary = itemEl.querySelector('.log-details summary');
        const logListEl = itemEl.querySelector('.log-list');


        // 构建FormData
        const formData = new FormData();
        formData.append('files', file);

        try {
            // 1. 上传文件
            progressContainer.style.display = 'block';
            // 模拟上传进度
            updateProgressBar(progressBar, 50);

            const response = await fetch(`${API_BASE}/upload`, {
                method: 'POST',
                body: formData
            });

            if (!response.ok) throw new Error('Upload failed');

            const result = await response.json();
            const taskId = result.task_ids[0]; // 假设一次传一个或取第一个

            // 上传完成，进入处理中，进度固定为30%
            updateProgressBar(progressBar, 30);
            statusBadge.textContent = '处理中...';
            statusBadge.className = 'status-badge status-processing';

            // 2. 轮询状态
            pollStatus(taskId, itemEl);

        } catch (error) {
            console.error(error);
            statusBadge.textContent = '失败';
            statusBadge.className = 'status-badge status-error';
        }
    }

    function pollStatus(taskId, itemEl) {
        const statusBadge = itemEl.querySelector('.status-badge');
        const progressBar = itemEl.querySelector('.progress-bar');

        const interval = setInterval(async () => {
            try {
                const res = await fetch(`${API_BASE}/status/${taskId}`);
                const data = await res.json();

            } catch (e) {
                console.error('Polling error', e);
            }
        }, 2000); // 每2秒轮询一次

    }

    function updateProgressBar(bar, percentage) {
        bar.style.width = percentage + '%';
        if (percentage >= 100) {
            bar.style.backgroundColor = '#3498db'; // 蓝色
        } else {
            bar.style.backgroundColor = 'pink'; // 橘红色
        }
    }

</script>
</body>
</html>
